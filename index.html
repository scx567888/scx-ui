<!DOCTYPE html>
<!-- 设置语言 -->
<html lang="zh-cn">
<head>
    <!-- 设置编码集 -->
    <meta charset="utf-8">
    <!-- 设置浏览器兼容性 -->
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <!-- 指定使用 webkit 内核渲染 适用于如360等双核浏览器 -->
    <meta content="webkit" name="renderer">
    <!-- 设置响应式规则 -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <!-- 图标 -->
    <link href="/favicon.ico" rel="icon">
    <!-- 第三方库所需 css -->
    <!-- codemirror 代码编辑器及其主题的样式表 -->
    <link href="/assets/lib/codemirror/codemirror.css" rel="stylesheet">
    <link href="/assets/lib/codemirror/theme/darcula.css" rel="stylesheet">
    <link href="/assets/lib/codemirror/theme/idea.css" rel="stylesheet">
    <!-- 此处 title 无需设置内容 其内容将会由 js 代码动态进行生成 -->
    <title></title>
</head>
<body>
<div id="app">
    <style>body{margin: 0;} .loading-bg{width: 35px;height: 35px;position: relative;}  .loading-bg > div {width: 100%;height: 100%;position: absolute;opacity: 0;animation: loading-rotate 5s infinite;}  .loading-bg > div:after {content: " ";position: absolute;width: 5px;height: 5px;border-radius: 50%;background: #489349;}  .loading-bg > div:nth-child(1) {animation-delay: 0ms;}  .loading-bg > div:nth-child(2) {animation-delay: 175ms;}  .loading-bg > div:nth-child(3) {animation-delay: 350ms;}  .loading-bg > div:nth-child(4) {animation-delay: 525ms;}  .loading-bg > div:nth-child(5) {animation-delay: 700ms;}  @keyframes loading-rotate { 0% {transform: rotate(225deg);animation-timing-function: ease-out;opacity: 1;} 6% {transform: rotate(350deg);animation-timing-function: linear;} 29% {transform: rotate(495deg);animation-timing-function: ease-in-out;} 39% {transform: rotate(710deg);animation-timing-function: linear;} 62% {transform: rotate(855deg);animation-timing-function: ease-in;} 66% {transform: rotate(945deg);animation-timing-function: ease-in;opacity: 1;} 67% {opacity: 0;} 100% {opacity: 0;} }</style><div style="width: 100%;height: 100%;position: absolute;background: #ffffff;display: flex; align-items:center;flex-direction: column;"><div style="padding-top: 10%"><svg class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="#489349" width="200" height="200"><path d="M708.470453 8.245815L170.071283 549.420238h141.537926zM844.457872 471.713142L297.732941 1010.112312l396.861244-538.39917z"></path><path d="M258.879393 471.713142h499.545622v77.707096H258.879393z"></path></svg></div><div style="margin-top: 20px"><div class="loading-bg"><div></div><div></div><div></div><div></div><div></div></div></div></div>
</div>
<!--引入 第三方 lib 库 -->
<!-- echarts -->
<script src="/assets/lib/echarts.min.js" type="text/javascript"></script>
<!-- tinymce 富文本编辑器 -->
<script src="/assets/lib/tinymce/tinymce.min.js" type="text/javascript"></script>

</html>
